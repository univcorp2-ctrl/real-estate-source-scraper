name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Validate source inventory
        run: python -m realestate_scraper list-sites --sources data/sources.yml --top 5
      - name: Create sample outputs
        run: |
          mkdir -p outputs
          python -m realestate_scraper list-sites --sources data/sources.yml --category public-auction --top 10 > outputs/source_preview.jsonl
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: property-source-preview
          path: outputs/
